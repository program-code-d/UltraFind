<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let email = ""
        let password = ""
        function main()
        {
            email = localStorage.getItem("email")
            password = localStorage.getItem("password")
            if ((email != null) && (password != null))
            {
                fetch("http://localhost:8080/login", {
                    // Defines the HTTP verb as POST, which is used for sending data to a server.
                    method: 'POST',
                    headers: {
                        // Informs the server that the data being sent is formatted as a JSON string.
                        'Content-Type': 'application/json'
                    },
                    // Converts the JavaScript object into a standardized JSON string for transmission.
                    body: JSON.stringify({ email: email, password: password })
                })
                    .then(response =>
                    {
                        if (response.redirected)
                        {
                            window.location.href = response.url;
                            return;
                        }
                        return response.json();
                    })
                    .then((data) =>
                    {

                    })
            }
        }
        function signUp()
        {
            if (document.getElementById("login").style.display == "block")
            {
                console.error("tried to sign up from login screen")
            }
            else
            {
                if (document.getElementById("passwordSignUp").value == document.getElementById("confPassword").value)
                {
                    email = document.getElementById("emailSignUP").value
                    password = document.getElementById("passwordSignUp").value
                    fetch("http://localhost:8080/signup", {
                        // Defines the HTTP verb as POST, which is used for sending data to a server.
                        method: 'POST',
                        headers: {
                            // Informs the server that the data being sent is formatted as a JSON string.
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify({ email: email, age: document.getElementById("age").value, firstName: document.getElementById("first-name").value, lastName: document.getElementById("last-name").value, password: password })
                    })
                        .then(response =>
                        {
                            if (response.redirected)
                            {
                                localStorage.setItem('email', email);
                                localStorage.setItem('password', password);
                                window.location.href = response.url;
                                return;
                            }
                            return response.json();
                        })
                        .then((data) =>
                        {
                            if (data.message == "Email In Use")
                            {
                                document.getElementById("error").innerHTML = `<div style="color:red;"><h3>This Email Is Already In Use, Try Logging In</h3></div>`
                            }

                        })
                }
                else
                {
                    alert("passwords do not match try again")
                }
            }
        }

        function login()
        {
            if (document.getElementById("signUp").style.display == "block")
            {
                console.error("tried to Login from SignUp screen")
            }
            else
            {

                fetch("http://localhost:8080/login", {
                    // Defines the HTTP verb as POST, which is used for sending data to a server.
                    method: 'POST',
                    headers: {
                        // Informs the server that the data being sent is formatted as a JSON string.
                        'Content-Type': 'application/json'
                    },
                    // Converts the JavaScript object into a standardized JSON string for transmission.
                    body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value })
                })
                    .then(response =>
                    {
                        if (response.redirected)
                        {
                            window.location.href = response.url;
                            return;
                        }
                        return response.json();
                    })
                    .then((data) =>
                    {
                        if (data.message == "failed")
                        {
                            document.getElementById("error-login").innerHTML = `<div style="color:red;"><h3>Sign In Failed. Try Again</h3></div>`
                            document.getElementById("password").value = ""
                        }
                        if (data.message == "NotEmailFormat")
                        {
                            document.getElementById("error-login").innerHTML = `<div style="color:red;"><h3>This is not an email</h3></div>`
                        }

                    })

            }
        }

        function switchToSignUp()
        {
            document.getElementById("login").style.display = "none"
            document.getElementById("signUp").style.display = "block"
            checkAgeTimer()
        }
        function checkAgeTimer()
        {
            setTimeout(checkAge, 200)
        }
        function switchToSignIn()
        {
            document.getElementById("login").style.display = "block"
            document.getElementById("signUp").style.display = "none"
        }
        function checkAge()
        {
            var age = document.getElementById("age").value

            if ((age < 13) && (age != ""))
            {
                if (age < 12)
                {
                    document.getElementById("sorry-cant-sign-up").innerHTML = `  you can't sign up yet, wait till you are 13 and come back in ${13 - age} years`
                }
                else
                {
                    document.getElementById("sorry-cant-sign-up").innerHTML = `  you can't sign up yet, wait till you are 13 and come back in 1 year`
                }
            }
            else
            {
                document.getElementById("sorry-cant-sign-up").innerHTML = ``
            }
            checkAgeTimer()
        }


    </script>
    <link rel="stylesheet" href="CSS files/login.css">
</head>

<body onload="main()">
    <div id="login">
        <div id="login-card">
            <div onclick="switchToSignUp()">Dont Have An account? Sign Up</div>



            <table class="center-table">
                <tr>
                    <td>
                        <h1> Login</h1>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="group">
                            <input id="email" required="" type="text" class="input">
                            <span class="highlight"></span>
                            <span class="bar"></span>
                            <label>Email</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="group">
                            <input id="password" required="" type="password" class="input">
                            <span class="highlight"></span>
                            <span class="bar"></span>
                            <label>Passsword</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <a onclick="login()" class="myButton">Login</a>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div id="error-login"></div>
                    </td>
                </tr>
            </table>
        </div>

    </div>

    <div id="signUp" style="display: none;">
        <div id="signUp-card">
            <h4>
                <div onclick="switchToSignIn()">Back To Login</div>
                </h6>
                <table class="center-table">

                    <tr>
                        <td>
                            <h1> Sign Up</h1>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="group">
                                <input id="first-name" required="" type="text" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>First Name</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="group">
                                <input id="last-name" required="" type="text" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>Last Name</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="group">
                                <input id="age" step="1" min="13" max="110" required="" type="number" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>Age</label>
                            </div>
                        </td>
                        <td>
                            <div id="sorry-cant-sign-up">

                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>

                            <div class="group">
                                <input id="emailSignUP" required="" type="text" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>Enter Email</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="group">
                                <input id="passwordSignUp" required="" type="password" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>Enter Password</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="group">
                                <input id="confPassword" required="" type="password" class="input">
                                <span class="highlight"></span>
                                <span class="bar"></span>
                                <label>Confirm Password</label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button onclick="signUp()"> Sign Up </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div id="error"></div>
                        </td>
                    </tr>
                </table>



        </div>
    </div>
</body>

</html>
