<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<script src="navbar.js"></script>
<script>
    let listings
    let email
    let password

    function main() {
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')

        injectNavbar()

        fetch(getServerBase() + "/getListings", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ search: "", email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                if (data == `{"message":"failed"}`) {
                    localStorage.removeItem('email');
                    localStorage.removeItem('password');
                    
                    window.location.href = `${getServerBase()}/login`
                }
                listings = data
                draw_listings()
            })
    }

    function getServerBase() {
        const protocol = window.location.protocol; // 'http:' or 'https:'
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }


    function draw_listings() {
        let listings_div = ``;
        let l = 0;

        while (l < listings.length) {
            // Use the thumbnail from the database, or a placeholder if empty
            let imgSrc = listings[l].thumbnail ? `/images/${listings[l].thumbnail}` : 'placeholder.jpg';

            listings_div += `
            <div onclick="goToInfoListing(${listings[l].id})" id="${l}" class="listing-card">
                <div class="listing-img-box">
                    <img src="${imgSrc}" loading="lazy">
                </div>
                <div style="text-align: center;"><h1>${listings[l].title}</h1></div>
                <div class="listing-price-row">
                    <h2>$${listings[l].price}</h2>
                    <p>${listings[l].description}</p>
                </div>
            </div>
        `;
            l++;
        }

        document.getElementById("listings").innerHTML = listings_div;
    }

    function goToInfoListing(id) {
        window.location.href = `${getServerBase()}/info?id=${id}`
    }

    function searchListings(search) {
        event.preventDefault();
        fetch(getServerBase() + "/searchListings", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, search: search })
        })
            .then(response => response.json())
            .then((data) => {
                // data is now the array of listings including thumbnails
                listings = data;
                // We call draw_listings() which uses the new .thumbnail property
                draw_listings();
            })
            .catch(err => console.error("Search failed:", err));
    }

    function injectNavbar() {
        fetch(getServerBase() + "/getNavbar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.text())
            .then((data) => {
                if (data == `{"message":"failed"}`) {
                    window.location.href = `${getServerBase()}/login`
                }
                document.getElementById("navbar-container").innerHTML = data
            })
    }
</script>
<link rel="stylesheet" href="CSS files/navbar.css">
</link>
<link rel="stylesheet" href="CSS files/index.css">

<body onload="main()">

    <!-- 1. Top Navigation Bar (Injected from server) -->
    <div id="navbar-container"></div>

    <!-- 2. Main Container with Sidebar -->
    <div class="main-container">


        <main id="listings">
        </main>

        <div class="action-area">
            <button onclick="goToDifferentScreen('createListing')" class="clean-btn">+</button>
        </div>
    </div>

    <form class="form"
        onsubmit="event.preventDefault(); searchListings(document.getElementsByClassName('input')[0].value);">
        <!-- This button triggers the search when clicked -->
        <button type="submit">
            <svg width="17" height="16" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
                aria-labelledby="search">
                <path d="M7.667 12.667A5.333 5.333 0 107.667 2a5.333 5.333 0 000 10.667zM14.334 14l-2.9-2.9"
                    stroke="currentColor" stroke-width="1.333" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>

        <input class="input" placeholder="Type your text" required="" type="text">

        <!-- This button also triggers the search when clicked -->
        <button type="button" class="reset" onclick="searchListings(document.getElementsByClassName('input')[0].value)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </form>

</body>

</html>
