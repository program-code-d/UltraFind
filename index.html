<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script src="navbar.js"></script>
<script>
    let listings
    let email
    let password
     
    function main() {
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')

        injectNavbar()

        fetch(getServerBase() + "/getListings", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ search: "", email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                listings = data
                draw_listings()
            })
    }

    function getServerBase() {
        const protocol = window.location.protocol; // 'http:' or 'https:'
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }

    function goToHome() {
        window.location.href = 'index.html'
    }

    function goToFriends() {
        window.location.href = 'friends.html'
    }

    function goToManageListings() {
        window.location.href = 'manage_listings.html'
    }

    function draw_listings() {
        let listings_div = ``
        let l = 0

        while (l < listings.length) {
            listings_div += `
               <div onclick="goToInfoListing(${listings[l].id})" id="${l}" class="listing-card">
                  <div style="text-align: center;"><h1>${listings[l].title}</h1></div>
                    <div style="display: flex; align-items: baseline; gap: 10px; justify-content: center;">
                    <h2 style="margin: 0;">$${listings[l].price}</h2>
                   <p style="margin: 0;">${listings[l].description}</p>
                  </div>
                </div>
`
            l++
        }

        document.getElementById("listings").innerHTML = listings_div
    }

    function goToInfoListing(id) {
        window.location.href = `${getServerBase()}/info_listing.html?id=${id}`
    }

    function injectNavbar() {
        fetch(getServerBase() + "/getNavbar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                document.getElementById("navbar-container").innerHTML = data
            })
    }
</script>
<link rel="stylesheet" href="CSS files/navbar.css"></link>
<link rel="stylesheet" href="CSS files/index.css">

<body onload="main()">

    <!-- 1. Top Navigation Bar (Injected from server) -->
    <div id="navbar-container"></div>

    <!-- 2. Main Container with Sidebar -->
    <div class="main-container">
        

        <main id="listings">
        </main>

        <div class="action-area">
            <button onclick="goToDifferentScreen('create_listing.html')" class="clean-btn">+</button>
        </div>
    </div>

</body>

</html>
