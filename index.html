<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script src="navbar.js"></script>
<script>
    let listings
    let email
    let password

    function main() {
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')

        injectNavbar()

        fetch("http://localhost:8080/getListings", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ search: "", email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                listings = data
                draw_listings()
            })
    }

    function draw_listings() {
        let listings_div = ``
        let l = 0

        while (l < listings.length) {
            listings_div += `
                <div id="${l}" class="listing-card">
                    <h1>${listings[l].title}</h1>
                    <div class="listing-details">
                        <h2>$${listings[l].price}</h2>
                        <p>${listings[l].description}</p>
                    </div>
                    <button onclick="goToInfoListing(${listings[l].id})">More Info</button>
                </div>`
            l++
        }

        document.getElementById("listings").innerHTML = listings_div
    }

    function goToInfoListing(id) {
        sessionStorage.removeItem(`id`)
        sessionStorage.setItem(`id`, id)
        goToDifferentScreen("info_listing.html")
    }

    function injectNavbar() {
        fetch("http://localhost:8080/getNavbar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                document.getElementById("navbar").innerHTML = data
            })
    }
</script>
<link rel="stylesheet" href="CSS files/navbar.css"></link>
<link rel="stylesheet" href="CSS files/index.css">

<body onload="main()">

    <div class="main-container">
        <nav id="navbar">
        </nav>

        <main id="listings">
        </main>

        <div class="action-area">
            <button onclick="goToDifferentScreen('create_listing.html')" class="clean-btn">+</button>
        </div>
    </div>

</body>

</html>
