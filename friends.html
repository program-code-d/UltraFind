<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Friends</title>
    <link rel="stylesheet" href="CSS files/messages.css">
</head>

<body>
    <div id="messages-display"></div>

    <div class="chat-bar">
        <form id="chat-form">
            <input type="text" id="user-friend-id" placeholder="Type your friends name" required>
            <button onclick="findFriend(event)" type="submit">Find friend</button>
        </form>
    </div>

    <div class="friends-nav" id="friends-list-nav">
        <div id="Home" style="cursor:pointer;">
            <div><strong>Friends</strong></div>
        </div>
    </div>

    <div class="people">
        <button onclick="startaddingfriend(event)">Add friend</button>
    </div>

    <label for="friend-select">Choose a person:</label>
    <select id="friend-select" class="dropdown">
        <option value="none" selected disabled>Select Your Friend</option>

    </select>

    <div class="messageBox">
        <div class="fileUploadWrapper">
            <label for="file">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 337 337">
                    <circle stroke-width="20" stroke="#6c6c6c" fill="none" r="158.5" cy="168.5" cx="168.5"></circle>
                    <path stroke-linecap="round" stroke-width="25" stroke="#6c6c6c" d="M167.759 79V259"></path>
                    <path stroke-linecap="round" stroke-width="25" stroke="#6c6c6c" d="M79 167.138H259"></path>
                </svg>
                <span class="tooltip">Add an image</span>
            </label>
            <input type="file" id="file" name="file" />
        </div>
        <input required="" placeholder="Message..." type="text" id="messageInput" />
        <button id="sendButton" onclick="sendMessage(event)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 664 663">
                <path fill="none"
                    d="M646.293 331.888L17.7538 17.6187L155.245 331.888M646.293 331.888L17.753 646.157L155.245 331.888M646.293 331.888L318.735 330.228L155.245 331.888">
                </path>
                <path stroke-linejoin="round" stroke-linecap="round" stroke-width="33.67" stroke="#6c6c6c"
                    d="M646.293 331.888L17.7538 17.6187L155.245 331.888M646.293 331.888L17.753 646.157L155.245 331.888M646.293 331.888L318.735 330.228L155.245 331.888">
                </path>
            </svg>
        </button>
    </div>


    <script>
        var email;
        var password;
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')
        let friend_input_element = document.getElementById('user-friend-id');
        let friendSearch = document.getElementById('chat-form');
        let friendsResults;
        document.querySelector('.dropdown').style.display = 'none';
        document.querySelector('.chat-bar').style.display = 'none';

        function startaddingfriend(event)
        {
            event.preventDefault();
            document.querySelector('.chat-bar').style.display = 'block';
        }

        function findFriend(event)
        {
            event.preventDefault();
            fetch(getServerBase() + "/findFriend", {
                // Defines the HTTP verb as POST, which is used for sending data to a server.
                method: 'POST',
                headers: {
                    // Informs the server that the data being sent is formatted as a JSON string.
                    'Content-Type': 'application/json'
                },
                // Converts the JavaScript object into a standardized JSON string for transmission.
                body: JSON.stringify({ email: email, password: password, friendSearch: friendSearch.elements['user-friend-id'].value })
            })
                .then(response => response.json())
                .then((data) =>
                {
                    friendsResults = data.friends;
                    // 1. Get the select element
                    const select = document.getElementById('friend-select');

                    // 2. Clear out old results (keep the first "Choose a person" option)
                    select.innerHTML = '<option value="none" selected disabled>Choose a person...</option>';

                    // 3. Loop through the friends and add them
                    data.friends.forEach(friend =>
                    {
                        const option = document.createElement('option');
                        option.value = friend.id; // The ID from your database
                        option.textContent = `${friend.first_name} ${friend.last_name}`; // The name
                        select.appendChild(option);
                    });

                    // 4. Make the dropdown container visible
                    document.querySelector('.dropdown').style.display = 'block';
                })


        }

        function getServerBase()
        {
            const protocol = window.location.protocol; // 'http:' or 'https:'
            const hostname = window.location.hostname;
            const port = window.location.port ? ':' + window.location.port : '';
            return `${protocol}//${hostname}${port}`;
        }


        // 1. Get a reference to the dropdown
        const friendSelect = document.getElementById('friend-select');

        // 2. Listen for when the user picks an option
        friendSelect.addEventListener('change', function ()
        {
            // This gets the 'value' (friend.id) you assigned in findFriend()
            const selectedFriendId = this.value;

            // This gets the actual name (e.g., "John Doe")
            const selectedFriendName = this.options[this.selectedIndex].text;

            // For now, let's log it to the console to prove it works
            console.log("User selected Friend ID:", selectedFriendId);
            console.log("User selected Name:", selectedFriendName);

            // Logic: You can now use selectedFriendId to filter messages or start a chat
            if (selectedFriendId !== "none")
            {
                alert("You are now chatting with " + selectedFriendName);
                fetch(getServerBase() + "/addfriend", {
                    // Defines the HTTP verb as POST, which is used for sending data to a server.
                    method: 'POST',
                    headers: {
                        // Informs the server that the data being sent is formatted as a JSON string.
                        'Content-Type': 'application/json'
                    },
                    // Converts the JavaScript object into a standardized JSON string for transmission.
                    body: JSON.stringify({ email: email, password: password, selectedFriendId })
                })
                    .then(response => response.json())
                    .then((data) =>
                    {
                        const nav = document.getElementById('friends-list-nav');
                        const friends = data.friends; // Your array of names

                        friends.forEach(friendName =>
                        {
                            // 1. Create the outer wrapper div
                            const friendDiv = document.createElement('div');
                            friendDiv.className = 'friend-item'; // Good for CSS styling later
                            friendDiv.style.cursor = 'pointer';

                            // 2. Create the inner div for the name
                            const nameContainer = document.createElement('div');

                            // 3. Create the strong tag for the text
                            const strongName = document.createElement('strong');
                            strongName.textContent = friendName;

                            // 4. Assemble: strong -> inner div -> outer div
                            nameContainer.appendChild(strongName);
                            friendDiv.appendChild(nameContainer);

                            // 5. Add a click event so you can actually do something!
                            friendDiv.onclick = () =>
                            {
                                console.log(`You clicked on ${friendName}`);
                            };

                            // 6. Put it in the navigation menu
                            nav.appendChild(friendDiv);
                        });

                    })

            }
        });

    </script>
</body>

</html>
