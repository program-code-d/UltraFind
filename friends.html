<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Friends</title>
</head>

<body>

    <div id="messages-display"></div>

    <div class="chat-bar">
        <form id="chat-form">
            <input type="text" id="user-msg" placeholder="Type a message..." required>
            <input type="number" id="user-friend-id" placeholder="Type The Id of Your Friend..." required>
            <button onclick="messageFunc(event)" type="submit">Submit</button>
        </form>
    </div>

</body onload="main()">
<script>
    var email
    var password
    let friend_id = document.getElementById('user-friend-id')
    let messages;

    function messageFunc(event)
    {
        event.preventDefault();
        let message = document.getElementById('user-msg');

        email = localStorage.getItem('email');
        password = localStorage.getItem('password');

        fetch(getServerBase() + "/sendfriendmessage", {
            
            method: 'POST',
            headers: {
           
                'Content-Type': 'application/json'
            },
            // Converts the JavaScript object into a standardized JSON string for transmission.
            body: JSON.stringify({ email: email, password: password, message: message.value, friend_id: friend_id.value })
        })
            .then(response =>
            {
                if (response.redirected)
                {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then(response => response.json())
            .then((data) =>
            {

            })
    }
function getServerBase()
    {
        const protocol = window.location.protocol; // 'http:' or 'https:'
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }
    function main()
    {

        fetch(getServerBase() + "/getfriendmessages", {
            // Defines the HTTP verb as POST, which is used for sending data to a server.
            method: 'POST',
            headers: {
                // Informs the server that the data being sent is formatted as a JSON string.
                'Content-Type': 'application/json'
            },
            // Converts the JavaScript object into a standardized JSON string for transmission.
            body: JSON.stringify({ email: email, password: password, friend_id: friend_id.value })
        })
            .then(response =>
            {
                if (response.redirected)
                {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then(response => response.json())
            .then((data) =>
            {
                messages = data;
                displayMessages();
            })
    }
    function displayMessages()
    {
         let messages_text = document.getElementById('messages-display');
         messages_text.innerHTML=messages;
    }



</script>

</html>
