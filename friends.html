<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Friends</title>
</head>

<body>

    <div id="messages-display"></div>

    <div class="chat-bar">
        <form id="chat-form">
            <input type="text" id="user-msg" placeholder="Type a message..." required>
            <input type="number" id="user-friend-id" placeholder="Type The Id of Your Friend..." required>
            <button onclick="messageFunc" type="submit">Submit</button>
        </form>
    </div>

</body>
<script>
    function messageFunc()
    {
        var email
        var password
        let message = document.getElementById('user-msg');
       let friend_id=document.getElementById('user-friend-id')

        email = localStorage.getItem('email');
        password = localStorage.getItem('password');

        fetch("http://localhost:8080/sendfriendmessage", {
            // Defines the HTTP verb as POST, which is used for sending data to a server.
            method: 'POST',
            headers: {
                // Informs the server that the data being sent is formatted as a JSON string.
                'Content-Type': 'application/json'
            },
            // Converts the JavaScript object into a standardized JSON string for transmission.
            body: JSON.stringify({ email: email, password: password, message: message,friend_id: friend_id })
        })
            .then(response =>
            {
                if (response.redirected)
                {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then((data) =>
            {


            })
    }



</script>

</html>
