<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Friends</title>
    <link rel="stylesheet" href="CSS files/messages.css">
</head>

<body onload="main()">
    <div id="messages-display"></div>

    <div class="chat-bar" id="chat-bar-container" style="display:none;">
        <form id="chat-form">
            <input type="text" id="user-friend-id" placeholder="Type your friends name" required>
            <button onclick="findFriend(event)" type="submit">Find friend</button>
        </form>
    </div>

    <div class="friends-nav" id="friends-list-nav">
        <div id="Home" style="cursor:pointer;" onclick="location.reload()">
            <div><strong>Friends</strong></div>
        </div>
    </div>

    <div class="people">
        <button onclick="startaddingfriend(event)">+</button>
    </div>

    <div class="dropdown" id="dropdown-container" style="display:none;">
        <label for="friend-select">Choose a person:</label>
        <select id="friend-select">
            <option value="none" selected disabled>Select Your Friend</option>
        </select>
    </div>

    <div class="messageBox">
        <div class="fileUploadWrapper">
            <label for="file">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 337 337">
                    <circle stroke-width="20" stroke="#6c6c6c" fill="none" r="158.5" cy="168.5" cx="168.5"></circle>
                    <path stroke-linecap="round" stroke-width="25" stroke="#6c6c6c" d="M167.759 79V259"></path>
                    <path stroke-linecap="round" stroke-width="25" stroke="#6c6c6c" d="M79 167.138H259"></path>
                </svg>
                <span class="tooltip">Add an image</span>
            </label>
            <input type="file" id="file" name="file" />
        </div>
        <input required placeholder="Message..." type="text" id="messageInput" />
        <button id="sendButton" onclick="sendMessage(event)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 664 663">
                <path stroke-linejoin="round" stroke-linecap="round" stroke-width="33.67" stroke="#6c6c6c"
                    d="M646.293 331.888L17.7538 17.6187L155.245 331.888M646.293 331.888L17.753 646.157L155.245 331.888M646.293 331.888L318.735 330.228L155.245 331.888">
                </path>
            </svg>
        </button>
    </div>

    <script>
        var email;
        var password;

        function getServerBase() {
            return `${window.location.protocol}//${window.location.hostname}${window.location.port ? ':' + window.location.port : ''}`;
        }

        function startaddingfriend(event) {
            event.preventDefault();
            // Using ID to match CSS class visibility
            document.getElementById('chat-bar-container').style.display = 'flex';
        }

        function main() {
            email = localStorage.getItem('email');
            password = localStorage.getItem('password');

            fetch(getServerBase() + "/getfriends", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(response => response.json())
            .then((data) => {
                const nav = document.getElementById('friends-list-nav');
                const friends = data.friends;
                if (!friends) return;

                const home = document.getElementById('Home');
                nav.innerHTML = '';
                nav.appendChild(home);

                friends.forEach(friend => {
                    const friendHTML = `
                        <div onclick="openChat(${friend.id})" style="cursor:pointer;">
                            <div><strong>${friend.first_name} ${friend.last_name}</strong></div>
                        </div>`;
                    nav.insertAdjacentHTML('beforeend', friendHTML);
                });
            });
        }

        function findFriend(event) {
            event.preventDefault();
            const searchInput = document.getElementById('user-friend-id').value;

            fetch(getServerBase() + "/findFriend", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email, 
                    password: password, 
                    friendSearch: searchInput // Match backend body.friendSearch
                })
            })
            .then(response => response.json())
            .then((data) => {
                const select = document.getElementById('friend-select');
                const dropdownContainer = document.getElementById('dropdown-container');

                select.innerHTML = '<option value="none" selected disabled>Select Your Friend</option>';

                if (data.friends && data.friends.length > 0) {
                    data.friends.forEach(friend => {
                        const option = document.createElement('option');
                        option.value = friend.id;
                        option.textContent = `${friend.first_name} ${friend.last_name}`;
                        select.appendChild(option);
                    });
                    dropdownContainer.style.display = 'flex';
                } else {
                    alert("No one found");
                }
            });
        }

        document.getElementById('friend-select').addEventListener('change', function () {
            const selectedFriendId = this.value;
            if (selectedFriendId !== "none") {
                fetch(getServerBase() + "/addfriend", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: email, 
                        password: password, 
                        selectedFriendId: selectedFriendId 
                    })
                })
                .then(response => response.json())
                .then(() => {
                    alert("Friend added!");
                    location.reload(); 
                });
            }
        });

        function openChat(id) { console.log("Chatting with:", id); }
        function sendMessage(event) { event.preventDefault(); }
    </script>
</body>
</html>
