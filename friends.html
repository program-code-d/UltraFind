<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Friends</title>
    <link rel="stylesheet" href="CSS files/messages.css">
</head>

<body onload="main()">

    <body onload="main()">
        <!-- 1. The Sidebar -->
        <div class="friends-nav" id="friends-list-nav">
            <div class="chats-header"><strong>Chats</strong></div>

            <div class="chat-section">

                <div id="Work-Messages" onclick="showWorkMessages()">
                    <div class="work-icon-circle">
                        <svg class="work-icon">
                            <use href="icons.svg#work-icon"></use>
                        </svg>
                    </div>
                    <strong>Work</strong>
                </div>
            </div>

            <div class="chat-section">


            </div>

            <!-- Friends list renders here -->
            <div class="people">
                <button onclick="startaddingfriend(event)">+ Add Friend</button>
            </div>
        </div>

        <!-- 2. The Main Chat Area -->
        <div class="chat-main-container">
            <div id="messages-display">
                <div class="chat-header">Select a friend to start chatting</div>
            </div>

            <!-- 3. The Input Box (Inside the container) -->
            <div class="messageBox">
                <div class="fileUploadWrapper">
                    <label for="file">
                        <!-- SVG Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 337 337">
                            <circle stroke-width="20" r="158.5" cy="168.5" cx="168.5"></circle>
                            <path stroke-linecap="round" stroke-width="25" d="M167.759 79V259"></path>
                            <path stroke-linecap="round" stroke-width="25" d="M79 167.138H259"></path>
                        </svg>

                        <!-- TOOLTIP MUST BE INSIDE LABEL -->
                        <span class="tooltip">Add an image</span>
                    </label>
                    <input type="file" id="file" name="file" />
                </div>

                <input required placeholder="Message..." type="text" id="messageInput" />

                <button id="sendButton" onclick="sendMessage(event, document.getElementById('messageInput').value)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 664 663">
                        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="33.67"
                            d="M646.293 331.888L17.7538 17.6187L155.245 331.888M646.293 331.888L17.753 646.157L155.245 331.888M646.293 331.888L318.735 330.228L155.245 331.888">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Search/Select Windows (Hidden by default) -->
            <div class="chat-bar" id="add-friend-modal" style="display:none;">
                <form id="chat-form">
                    <input type="text" id="user-friend-id" placeholder="Friend's name..." required>
                    <button onclick="findFriend(event)" type="submit">Search</button>
                    <button type="button"
                        onclick="document.getElementById('add-friend-modal').style.display='none'">Cancel</button>
                </form>
            </div>

            <select id="friend-select" class="dropdown" style="display:none;"></select>


            <script>
                var email;
                var password;
                email = localStorage.getItem('email')
                password = localStorage.getItem('password')
                let friend_input_element = document.getElementById('user-friend-id');
                let friendSearch = document.getElementById('chat-form');
                let friendsResults;
                let currentChatFriendId = null;
                document.querySelector('.dropdown').style.display = 'none';
                document.querySelector('.chat-bar').style.display = 'none';

                function startaddingfriend(event)
                {
                    event.preventDefault();
                    document.getElementById('add-friend-modal').style.display = 'block';
                }
                function showWorkMessages()
                {
                    document.getElementById("friends-list-nav").innerHTML =
                        `
                    <div class="chats-header"><strong><- Work</strong></div>   
                    </div>
            
            
                    `
                }
                async function main()
                {
                    try
                    {
                        console.log("Attempting fetch...");

                        // Use the variables from localStorage defined at the top of your script
                        if (!email || !password)
                        {
                            console.log("User not logged in.");
                            return;
                        }

                        // FIX: Match the backend route exactly: "/getfriends"
                        const response = await fetch(getServerBase() + "/getfriends", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: email,
                                password: password
                            })
                        });

                        if (!response.ok)
                        {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        console.log("Data received:", data);

                        if (data.success)
                        {
                            renderFriends(data.friends); // Backend sends 'friends' in the route handler
                        }

                    } catch (error)
                    {
                        console.error("The fetch failed:", error);
                    }
                }

                // Add this function to handle the display logic
                function renderFriends(friendsList)
                {
                    const nav = document.getElementById('friends-list-nav');
                    // Find the Friends section (the second chat-section)
                    const chatSections = nav.querySelectorAll('.chat-section');
                    const friendsSection = chatSections.length > 1 ? chatSections[1] : null;

                    if (!friendsSection) return;

                    // Get the Home div and keep it, remove only friend items
                    const homeDiv = friendsSection.querySelector('#Home');

                    // Remove all friend items from this section
                    friendsSection.querySelectorAll('.friend-item').forEach(item => item.remove());

                    // Append friend items back to the Friends section
                    for (let i = 0; i < friendsList.length; i++)
                    {
                        const friend = friendsList[i];
                        const friendDiv = document.createElement('div');
                        friendDiv.className = 'friend-item';
                        // Add data-id for CSS targeting
                        friendDiv.setAttribute('data-id', friend.id);
                        friendDiv.innerHTML = `<strong>${friend.first_name} ${friend.last_name}</strong>`;

                        friendDiv.onclick = function ()
                        {
                            // Remove active from all, add to this one
                            document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
                            friendDiv.classList.add('active');

                            startChatWithFriend(friend.id, friend.first_name, friend.last_name);
                        };
                        friendsSection.appendChild(friendDiv);
                    }
                }
                // Global variable to track current chat

                function startChatWithFriend(friendid, friendfirst, friendlast)
                {
                    currentChatFriendId = friendid;
                    const display = document.getElementById('messages-display');
                    display.innerHTML = `<div class="chat-header">Chatting with ${friendfirst} ${friendlast}</div>`;

                    fetch(getServerBase() + "/getfriendmessages", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            friendId: friendid // Matches Backend body.friendId
                        })
                    })
                        .then(res => res.json())
                        .then(data =>
                        {
                            renderMessages(data); // Breakpoint here will now work
                        })
                        .catch(err => console.error("Load Error:", err));
                }
                function renderMessages(messages)
                {
                    const display = document.getElementById('messages-display');
                    const headerHTML = display.querySelector('.chat-header')?.outerHTML || '';

                    const msgArray = Array.isArray(messages) ? messages : (messages.messages || []);

                    // Create a temporary container to prevent flickering during the loop
                    let newContent = headerHTML;

                    for (let i = 0; i < msgArray.length; i++)
                    {
                        const msg = msgArray[i];
                        // Use Number() to ensure we are comparing numbers to numbers
                        const type = (Number(msg.sender_id) === Number(currentChatFriendId)) ? 'received' : 'sent';

                        newContent += `
            <div class="message ${type}">
                <p>${msg.message_text}</p>
                <span class="time-right">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
        `;
                    }

                    // Update the display once
                    display.innerHTML = newContent;
                    display.scrollTop = display.scrollHeight;
                }
                function sendMessage(event, message)
                {
                    event.preventDefault();
                    if (!message.trim() || !currentChatFriendId) return;

                    fetch(getServerBase() + "/sendfriendmessage", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            friendId: currentChatFriendId,
                            message: message
                        })
                    })
                        .then(res => res.json())
                        .then(data =>
                        {
                            document.getElementById('messageInput').value = "";
                            const display = document.getElementById('messages-display');

                            const msgDiv = document.createElement('div');
                            // CHANGED 'outgoing' to 'sent' to match your CSS
                            msgDiv.className = 'message sent';

                            const p = document.createElement('p');
                            p.textContent = message;

                            const span = document.createElement('span');
                            span.className = 'time-right';
                            span.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                            msgDiv.appendChild(p);
                            msgDiv.appendChild(span);
                            display.appendChild(msgDiv);
                            display.scrollTop = display.scrollHeight;
                        });
                }

                function findFriend(event)
                {
                    event.preventDefault();

                    fetch(getServerBase() + "/findFriend", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            friendSearch: friendSearch.elements['user-friend-id'].value
                        })
                    })
                        .then(response => response.json())
                        .then((data) =>
                        {
                            // Assign results (ensure friendsResults is declared elsewhere or use let/const)
                            const friendsList = data.friends;
                            const select = document.getElementById('friend-select');

                            // Clear out old results
                            select.innerHTML = '<option value="none" selected disabled>Choose a person...</option>';

                            // --- Traditional For Loop ---
                            if (friendsList && friendsList.length > 0)
                            {
                                for (let i = 0; i < friendsList.length; i++)
                                {
                                    // Access the specific friend using the index [i]
                                    const friend = friendsList[i];

                                    const option = document.createElement('option');
                                    option.value = friend.id;
                                    option.textContent = friend.first_name + " " + friend.last_name;

                                    select.appendChild(option);
                                }

                                // Show the dropdown if we found people
                                document.querySelector('.dropdown').style.display = 'block';
                            } else
                            {
                                console.log("No friends found in the database.");
                            }
                        })
                        .catch(error =>
                        {
                            console.error("Error fetching friends:", error);
                        });
                }
                async function getFriends(body)
                {
                    let conn;
                    try
                    {
                        conn = await pool.getConnection();
                        // ... auth logic ...
                        const friends = await conn.query(query, [userId, userId]);

                        // CHANGE THIS: Match the frontend key 'friends'
                        return { success: true, friends: friends, userExist: true };
                    } catch (err)
                    {
                        console.error(err);
                        return { success: false, userExist: false };
                    } finally
                    {
                        if (conn) conn.release();
                    }
                }

                function getServerBase()
                {
                    const protocol = window.location.protocol; // 'http:' or 'https:'
                    const hostname = window.location.hostname;
                    const port = window.location.port ? ':' + window.location.port : '';
                    return `${protocol}//${hostname}${port}`;
                }


                // 1. Get a reference to the dropdown
                const friendSelect = document.getElementById('friend-select');

                // 2. Listen for when the user picks an option
                friendSelect.addEventListener('change', function ()
                {
                    // This gets the 'value' (friend.id) you assigned in findFriend()
                    const selectedFriendId = this.value;

                    // This gets the actual name (e.g., "John Doe")
                    const selectedFriendName = this.options[this.selectedIndex].text;

                    // For now, let's log it to the console to prove it works
                    console.log("User selected Friend ID:", selectedFriendId);
                    console.log("User selected Name:", selectedFriendName);

                    // Logic: You can now use selectedFriendId to filter messages or start a chat
                    if (selectedFriendId !== "none")
                    {
                        alert("You are now chatting with " + selectedFriendName);
                        fetch(getServerBase() + "/addfriend", {
                            // Defines the HTTP verb as POST, which is used for sending data to a server.
                            method: 'POST',
                            headers: {
                                // Informs the server that the data being sent is formatted as a JSON string.
                                'Content-Type': 'application/json'
                            },
                            // Converts the JavaScript object into a standardized JSON string for transmission.
                            body: JSON.stringify({
                                email: email,
                                password: password,
                                selectedFriendId: selectedFriendId // Match the backend name!
                            })
                        })
                            .then(response => response.json())
                            .then((data) =>
                            {
                                const nav = document.getElementById('friends-list-nav');
                                const friends = data.friends; // Your array of names

                                friends.forEach(friendName =>
                                {
                                    // 1. Create the outer wrapper div
                                    const friendDiv = document.createElement('div');
                                    friendDiv.className = 'friend-item'; // Good for CSS styling later
                                    friendDiv.style.cursor = 'pointer';

                                    // 2. Create the inner div for the name
                                    const nameContainer = document.createElement('div');

                                    // 3. Create the strong tag for the text
                                    const strongName = document.createElement('strong');
                                    strongName.textContent = friendName;

                                    // 4. Assemble: strong -> inner div -> outer div
                                    nameContainer.appendChild(strongName);
                                    friendDiv.appendChild(nameContainer);

                                    // 5. Add a click event so you can actually do something!
                                    friendDiv.onclick = () =>
                                    {
                                        console.log(`You clicked on ${friendName}`);
                                    };

                                    // 6. Put it in the navigation menu
                                    nav.appendChild(friendDiv);
                                });

                            })

                    }
                });
                // This runs every 3 seconds
                setInterval(function ()
                {
                    if (currentChatFriendId)
                    {
                        // We don't want to clear the header, so we just fetch and re-render
                        fetch(getServerBase() + "/getfriendmessages", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: email,
                                password: password,
                                friendId: currentChatFriendId
                            })
                        })
                            .then(res => res.json())
                            .then(data =>
                            {
                                // Optional: Only re-render if the number of messages changed
                                renderMessages(data);
                            })
                            .catch(err => console.error("Polling error:", err));
                    }
                }, 3000); // 3000ms = 3 seconds

            </script>
    </body>

</html>
