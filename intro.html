<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraFind | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #FF5A1F;
            --accent-blue: #00C6FF;
            --deep-purple: #1A0B2E;
            --border-white: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #050505;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* --- GRADIENT MESH BACKGROUND --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, var(--deep-purple) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #0c142b 0%, transparent 50%);
            z-index: -2;
        }

        /* --- SNOW / PARTICLE CANVAS --- */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        .ambient-glow {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(255, 90, 31, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- SKIP BUTTON --- */
        .skip-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-white);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .skip-btn:hover {
            background: var(--brand-orange);
            border-color: var(--brand-orange);
            transform: scale(1.05);
        }

        /* --- ANIMATION SCENE --- */
        .scene-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .eye-focus {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .eye-frame {
            position: absolute;
            inset: 0;
            border: 1px solid var(--border-white);
            border-radius: 50%;
            animation: rotateFrame 15s linear infinite; /* SLOWER */
        }

        .eye-glow-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-blue);
            border-bottom: 2px solid var(--brand-orange);
            border-radius: 50%;
            opacity: 0.3;
            animation: rotateFrame 6s linear infinite reverse; /* SLOWER */
        }

        .rect-deco {
            position: absolute;
            width: 24px;
            height: 4px;
            background: linear-gradient(90deg, var(--brand-orange), var(--accent-blue));
            opacity: 0;
            animation: rectPulse 2s var(--easing) infinite; /* SLOWER */
        }
        .rect-1 { top: -30px; left: 50%; transform: translateX(-50%); animation-delay: 0.2s; }
        .rect-2 { bottom: -30px; left: 50%; transform: translateX(-50%); animation-delay: 0.5s; }

        .logo-inner {
            width: 80px;
            height: 80px;
            opacity: 0;
            transform: scale(0.5);
            animation: logoReveal 1.5s var(--easing) forwards 0.8s; /* SLOWER REVEAL */
        }

        .brand-title {
            font-size: 84px;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 60%, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: titleRise 1.5s var(--easing) forwards 1.8s; /* LATER REVEAL */
        }

        .visual-blocks {
            display: flex;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 0.8s forwards 2.5s;
        }

        .block {
            width: 35px;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .block-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--brand-orange), var(--accent-blue));
            animation: fillBlock 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards; /* SLOWER FILL */
        }

        .block:nth-child(1) .block-fill { animation-delay: 2.8s; }
        .block:nth-child(2) .block-fill { animation-delay: 3.2s; }
        .block:nth-child(3) .block-fill { animation-delay: 3.6s; }
        .block:nth-child(4) .block-fill { animation-delay: 4.0s; }

        /* --- FINAL LANDING --- */
        .landing-stage {
            position: absolute;
            opacity: 0;
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.95);
            transition: all 1.5s var(--easing);
        }

        .landing-stage.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .get-started-btn {
            margin-top: 40px;
            padding: 24px 70px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s var(--easing);
            box-shadow: 0 10px 40px rgba(0, 198, 255, 0.2);
        }

        .get-started-btn:hover {
            transform: translateY(-8px);
            background: var(--brand-orange);
            color: #fff;
            box-shadow: 0 25px 60px rgba(255, 90, 31, 0.4);
        }

        /* --- KEYFRAMES --- */
        @keyframes rotateFrame { to { transform: rotate(360deg); } }
        
        @keyframes rectPulse {
            0%, 100% { opacity: 0.1; transform: translateX(-50%) scaleX(1); }
            50% { opacity: 1; transform: translateX(-50%) scaleX(2.5); }
        }

        @keyframes logoReveal {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes titleRise {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fillBlock { to { width: 100%; } }

        @keyframes fadeIn { to { opacity: 1; } }

        .fade-out {
            opacity: 0 !important;
            transform: scale(1.1) !important;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="snowCanvas"></canvas>
    <div class="ambient-glow"></div>

    <button class="skip-btn" id="skipTrigger" onclick="showLanding()">Skip Intro</button>

    <!-- INTRO SCENE -->
    <div id="intro-container" class="scene-wrapper">
        <div class="eye-focus">
            <div class="eye-frame"></div>
            <div class="eye-glow-ring"></div>
            <div class="rect-deco rect-1"></div>
            <div class="rect-deco rect-2"></div>
            
            <svg class="logo-inner" viewBox="0 0 100 100" fill="none">
                <circle cx="45" cy="45" r="25" stroke="white" stroke-width="6"/>
                <path d="M68 68L85 85" stroke="white" stroke-width="6" stroke-linecap="round"/>
                <path d="M45 25V65" stroke="var(--brand-orange)" stroke-width="8"/>
                <path d="M25 45H65" stroke="var(--brand-orange)" stroke-width="8"/>
            </svg>
        </div>

        <h1 class="brand-title">UltraFind</h1>

        <div class="visual-blocks">
            <div class="block"><div class="block-fill"></div></div>
            <div class="block"><div class="block-fill"></div></div>
            <div class="block"><div class="block-fill"></div></div>
            <div class="block"><div class="block-fill"></div></div>
        </div>
    </div>

    <!-- LANDING SCENE -->
    <div id="landing-container" class="landing-stage">
        <h1 style="font-size: 110px; font-weight: 900; letter-spacing: -6px; margin-bottom: 10px;">UltraFind</h1>
        <button class="get-started-btn" onclick="completeIntro()">Get Started</button>
    </div>

    <script>
        // Check local storage
        if (localStorage.getItem('ultrafind_intro_watched') === 'true') {
            window.location.href=`${getServerBase()}/login`
        }

        // --- SNOW ANIMATION ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- TRANSITION LOGIC ---
        const intro = document.getElementById('intro-container');
        const landing = document.getElementById('landing-container');
        const skip = document.getElementById('skipTrigger');

        function showLanding() {
            intro.classList.add('fade-out');
            skip.style.display = 'none';
            setTimeout(() => {
                intro.style.display = 'none';
                landing.classList.add('active');
            }, 1000);
        }

        function completeIntro() {
            localStorage.setItem('ultrafind_intro_watched', 'true');
            window.location.href=`${getServerBase()}/login`
        }

        setTimeout(showLanding, 7500);

    </script>
</body>
</html>
