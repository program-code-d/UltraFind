<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings</title>
    <link rel="stylesheet" href="CSS files/navbar.css">
    <link rel="stylesheet" href="CSS files/manage_listings.css">
</head>

<script src="navbar.js"></script>
<script>
    let email
    let password

    function main() {
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')
        injectNavbar()
    }

    function goToDifferentScreen(file) {
        fetch(getServerBase() + "/switchFile", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, file: file })
        })
            .then(response => {
                if (response.redirected) {
                    localStorage.setItem('email', email);
                    localStorage.setItem('password', password);
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
    }

    function getServerBase() {
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }

    function injectNavbar() {
        fetch(getServerBase() + "/getNavbar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.json())
            .then((data) => {
                document.getElementById("navbar-container").innerHTML = data.navbar
            })
    }
</script>

<body onload="main()">
    <!-- 1. Top Navigation Bar (Injected from server) -->
    <div id="navbar-container"></div>

    <!-- 2. Main Content Area -->
    <main class="main-content">
        <div id="manage-listings-container">
            <h1>Manage Your Listings</h1>
            <!-- Content will go here -->
        </div>
    </main>

</body>

</html>
