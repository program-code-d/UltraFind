<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings</title>
    <link rel="stylesheet" href="CSS files/navbar.css">
    <link rel="stylesheet" href="CSS files/manage_listings.css">
</head>

<script src="navbar.js"></script>
<script>
    let email
    let password
    let my_listings
    function main()
    {
        email = localStorage.getItem('email')
        password = localStorage.getItem('password')
        injectNavbar()
        getMyListings()
    }

    function goToDifferentScreen(file)
    {
        fetch(getServerBase() + "/switchFile", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, file: file })
        })
            .then(response => response.json())
            .then((data) =>
            {
                if (data.success && data.redirect)
                {
                    localStorage.setItem('email', email);
                    localStorage.setItem('password', password);
                    window.location.href = getServerBase() + data.redirect;
                }
                else if (data.message === "failed")
                {
                    window.location.href = getServerBase() + "/login";
                }
            })
            .catch(error =>
            {
                console.error("Navigation error:", error);
                window.location.href = getServerBase() + "/login";
            });
    }

    function getServerBase()
    {
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }

    function injectNavbar()
    {
        fetch(getServerBase() + "/getNavbar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.text())
            .then((data) =>
            {
                document.getElementById("navbar-container").innerHTML = data
            })
    }
    function getMyListings()
    {

        fetch(getServerBase() + "/getMyListings", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(response => response.json())
            .then((data) =>
            {
                my_listings = data
                drawMyListings(my_listings)
            })
    }


    function goToInfoListing(listing)
    {
        goToDifferentScreen("info?id=" + listing)
    }
    function getActiveText(listing)
    {
        if (listing.is_active == true)
        {
            return "ACTIVE"
        }
        else
        {
            return "INACTIVE"
        }
    }
    function getStatusAndDisplay(listing)
    {
        if (listing.is_active == true)
        {
            return ` <div class="menu-item" onclick="deactivateListing(${listing.id})">
                      <span><svg class="icon"><use href="icons.svg#ban"></use></svg></span> Deactivate
                    </div>`
        }
        else
        {
            return ` <div class="menu-item" onclick="activateListing(${listing.id})">
                      <span><svg class="icon"><use href="icons.svg#unban"></use></svg></span> Activate
                    </div>`
        }
    }
    function drawMyListings(myListings)
    {
        let htmlContent = "";

        for (let i = 0; i < myListings.length; i++)
        {
            let item = myListings[i];

            htmlContent += `
            <div class="listing-card-square" data-id="${item.id}">
                <div onclick="goToInfoListing(${item.id})">
                    <div class="image-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>

                    <div class="card-content">
                        <h1>${item.title}</h1>
                        <div class="card-price">$${item.price}/hr</div>
                        <p class="card-desc">${item.description}</p>
                        <span style="font-size: 0.75rem; color: #9c27b0; font-weight: bold;">
                                ${getActiveText(item)}
                            </span>
                        <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.75rem; color: #999; font-weight: 600; text-transform: uppercase;">
                                ${item.location} • Due: Date
                            </span>
                        </div>
                    </div>
                </div>

                <div class="card-menu-button" onclick="event.stopPropagation(); toggleCardMenu(event, ${item.id})">
                  <span><svg class="icon"><use href="icons.svg#ellipsis"></use></svg></span>
                </div>

                <div class="card-menu-dropdown" id="menu-${item.id}" onclick="event.stopPropagation()">
                    <div class="menu-item" onclick="editListing(${item.id})">
                        <span><svg class="icon"><use href="icons.svg#pencil"></use></svg></span>Edit
                    </div>
                   ${getStatusAndDisplay(item)}
                    <div class="menu-item delete" onclick="deleteListing(${item.id})">
                        <span><svg class="icon"><use href="icons.svg#trash"></use></svg></span> Delete
                    </div>
                </div>
            </div>`;
        }

        document.getElementById("manage-listings-container").innerHTML = htmlContent;
        attachMenuEventListeners();
    }
    function deactivateListing(listing)
    {
        fetch(getServerBase() + "/deactivateListing", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, listing_id: listing })
        })
            .then(response => response.text())
            .then((data) =>
            {
                if (data == `{"message":"failed"}`)
                {
                    window.location.href = `${getServerBase()}/login`
                }
                const item = my_listings.find(item => item.id === listing)
                if (item) item.is_active = JSON.parse(data)
                drawMyListings(my_listings)
            })

    }
    function activateListing(listing)
    {
        fetch(getServerBase() + "/activateListing", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, listing_id: listing })
        })
            .then(response => response.text())
            .then((data) =>
            {
                if (data == `{"message":"failed"}`)
                {
                    window.location.href = `${getServerBase()}/login`
                }
                const item = my_listings.find(item => item.id === listing)
                if (item) item.is_active = JSON.parse(data)
                drawMyListings(my_listings)
            })

    }
    function toggleCardMenu(event, listingId)
    {
        const menu = document.getElementById(`menu-${listingId}`);
        const isOpen = menu.classList.contains('active');

        // Close all other menus
        document.querySelectorAll('.card-menu-dropdown.active').forEach(m =>
        {
            if (m.id !== `menu-${listingId}`)
            {
                m.classList.remove('active');
            }
        });

        // Toggle current menu
        if (isOpen)
        {
            menu.classList.remove('active');
        } else
        {
            menu.classList.add('active');
        }
    }

    function attachMenuEventListeners()
    {
        // Close menu when clicking outside
        document.addEventListener('click', function (event)
        {
            if (!event.target.closest('.card-menu-button') && !event.target.closest('.card-menu-dropdown'))
            {
                document.querySelectorAll('.card-menu-dropdown.active').forEach(menu =>
                {
                    menu.classList.remove('active');
                });
            }
        });
    }

    function editListing(listingId)
    {
        window.location.href = `${getServerBase()}/createListing?edit=1&id=${listingId}`
    }


    function deleteListing(listingId)
    {
        //console.log(`Delete listing: ${listingId}`);

        fetch(getServerBase() + "/deleteListing", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password, listing_id: listingId })
        })
            .then(response => response.text())
            .then((data) =>
            {

                if (JSON.parse(data).success)
                {
                    my_listings.splice(listingId, 1)
                    drawMyListings(my_listings)
                }
            })

    }

</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body onload="main()">
    <!-- 1. Top Navigation Bar (Injected from server) -->
    <div id="navbar-container"></div>

    <!-- 2. Main Content Area -->
    <main class="main-content">
        <div id="manage-listings-container">

        </div>
    </main>

</body>

</html>
