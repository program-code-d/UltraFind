<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Listing</title>
</head>

<body onload="main()">
    <div id="title"></div>
    <div id="price"></div>
    <div id="description"></div>
</body>
<script>
    
        var email
        var password
        var id
        var listing_info={}
    function main()
    {
       


        email = localStorage.getItem('email')
        password = localStorage.getItem('password')
        id = sessionStorage.getItem("id")

        fetch("http://localhost:8080/getinfolisting", {
            // Defines the HTTP verb as POST, which is used for sending data to a server.
            method: 'GET',
            headers: {
                // Informs the server that the data being sent is formatted as a JSON string.
                'Content-Type': 'application/json'
            },
            // Converts the JavaScript object into a standardized JSON string for transmission.
            body: JSON.stringify({ email: email, password: password, id:id })
        })
            .then(response => response.json())
            .then((data) =>
            {
                listing_info=data
            })


    }



</script>

</html>
