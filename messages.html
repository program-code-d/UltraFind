<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>

<body>

    <div id="messages-display"></div>

    <div class="chat-bar">
        <form id="friend-id">
            <input type="text" id="user-msg" placeholder="Type a message..." required>
            <button onclick="send()" type="submit">Submit</button>
        </form>
    </div>

</body>
<script>
    function getServerBase()
    {
        const protocol = window.location.protocol; // 'http:' or 'https:'
        const hostname = window.location.hostname;
        const port = window.location.port ? ':' + window.location.port : '';
        return `${protocol}//${hostname}${port}`;
    }
    function send()
    {
        var email
        var password
        let message = document.getElementById('user-msg');
       

        email = localStorage.getItem('email');
        password = localStorage.getItem('password');

        fetch(getServerBase() + "/sendMessage", {
            // Defines the HTTP verb as POST, which is used for sending data to a server.
            method: 'POST',
            headers: {
                // Informs the server that the data being sent is formatted as a JSON string.
                'Content-Type': 'application/json'
            },
            // Converts the JavaScript object into a standardized JSON string for transmission.
            body: JSON.stringify({ email: email, password: password, message: message.value })
        })
            .then(response =>
            {
                if (response.redirected)
                {
                    window.location.href = response.url;
                    return;
                }
                return response.json();
            })
            .then((data) =>
            {


            })
    }



</script>

</html>
