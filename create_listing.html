<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create A Listing</title>
    <link rel="stylesheet" href="CSS files/create_listing.css">
</head>

<body>

    <div class="page-container">
        <div class="form-container">
            <h1>Start Here</h1>

            <div class="form-group">
                <label for="listing-name">Name:</label>
                <input id="listing-name" placeholder="Enter The Listing Name Here" class="input-style" type="text"
                    oninput="updatePreview()">
            </div>

            <div class="form-group">
                <label>Images:</label>
                <div class="upload-container">
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" multiple>
                    <div class="image-placeholder" id="imagePreview"
                        onclick="document.getElementById('fileInput').click()">
                        <span>Click to upload images</span>
                    </div>
                    
                    <div class="image-gallery" id="imageGallery"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="listing-description">Description:</label>
                <textarea id="listing-description" placeholder="Describe your listing" class="input-style" rows="4"
                    oninput="updatePreview()"></textarea>
            </div>

            <div class="form-group">
                <label for="listing-price">Pay:</label>
                <div class="price-input-wrapper">
                    <input id="listing-price" placeholder="0.00" class="input-style" type="number" step="0.01" min="0"
                        oninput="updatePreview()">
                </div>
            </div>

            <div class="form-group">
                <label for="listing-location">Location:</label>
                <input id="listing-location" placeholder="Enter Your Location Here" class="input-style" type="text"
                    oninput="updatePreview()">
            </div>

            <div class="form-group age-input">
                <label for="age">Age requirement:</label>
                <input type="number" id="age" class="age" name="class" min="13" max="100" value="13"
                    oninput="updatePreview()">
            </div>

            <button class="create-listing-btn" id="submit-button" onclick="createListing()">Submit Listing</button>
        </div>

        <div class="preview-container">
            <h2 class="preview-title">Live Preview</h2>
            <div class="listing-container">
                <div class="main-content">
                    <div class="image-preview-box" id="preview-image-box">
                        <div class="carousel-wrapper">
                            <button class="carousel-arrow left" id="prevBtn" onclick="previousImage()" style="display: none;">❮</button>
                            <div class="carousel-image-display" id="carouselImageDisplay"></div>
                            <button class="carousel-arrow right" id="nextBtn" onclick="nextImage()" style="display: none;">❯</button>
                        </div>
                        <div class="image-counter" id="imageCounter"></div>
                    </div>
                    <div class="Age-pay-location">
                        <h1 id="preview-name">Listing Name</h1>
                        <h3 id="preview-location-header">Location</h3>
                        <div class="price-box" id="preview-price">$0.00</div>
                        <div class="age-box">Age Requirement: <span id="preview-age">13</span></div>
                        <div class="seller-info">Seller Info</div>
                    </div>
                </div>
                <div class="Description-repeats">
                    <p id="preview-description">Your description will appear here.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        var email;
        var password;
        var selectedImages = []; // Store file objects
        var currentImageIndex = 0;

        function getServerBase()
        {
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const port = window.location.port ? ':' + window.location.port : '';
            return `${protocol}//${hostname}${port}`;
        }

        // Handle file selection
        document.getElementById('fileInput').addEventListener('change', function()
        {
            const files = Array.from(this.files);
            
            // Add new files to selectedImages
            files.forEach(file => {
                const isDuplicate = selectedImages.some(img => img.name === file.name && img.size === file.size);
                if (!isDuplicate) {
                    selectedImages.push(file);
                }
            });

            // Update gallery display
            displayImageGallery();
            updatePreview();

            // Clear the input so the same file can be selected again
            this.value = '';
        });

        function displayImageGallery()
        {
            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = '';

            selectedImages.forEach((file, index) => {
                const thumbnail = document.createElement('div');
                thumbnail.className = 'image-thumbnail';
                thumbnail.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-thumbnail';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = () => removeImage(index);
                
                thumbnail.appendChild(deleteBtn);
                gallery.appendChild(thumbnail);
            });

            if (selectedImages.length > 0) {
                currentImageIndex = 0;
                updateCarousel();
            } else {
                document.getElementById('carouselImageDisplay').innerHTML = '';
                document.getElementById('imageCounter').innerHTML = '';
            }
        }

        function removeImage(index)
        {
            selectedImages.splice(index, 1);
            displayImageGallery();
            updatePreview();
        }

        function updateCarousel()
        {
            if (selectedImages.length === 0) {
                document.getElementById('carouselImageDisplay').innerHTML = '';
                document.getElementById('imageCounter').innerHTML = '';
                document.getElementById('prevBtn').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
                return;
            }

            const currentFile = selectedImages[currentImageIndex];
            document.getElementById('carouselImageDisplay').style.backgroundImage = `url(${URL.createObjectURL(currentFile)})`;
            document.getElementById('imageCounter').innerHTML = `${currentImageIndex + 1} / ${selectedImages.length}`;

            // Show/hide arrows
            document.getElementById('prevBtn').style.display = selectedImages.length > 1 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = selectedImages.length > 1 ? 'block' : 'none';
        }

        function previousImage()
        {
            if (selectedImages.length > 0) {
                currentImageIndex = (currentImageIndex - 1 + selectedImages.length) % selectedImages.length;
                updateCarousel();
            }
        }

        function nextImage()
        {
            if (selectedImages.length > 0) {
                currentImageIndex = (currentImageIndex + 1) % selectedImages.length;
                updateCarousel();
            }
        }

        async function createListing()
        {
            let listingName = document.getElementById('listing-name');
            let listingPrice = document.getElementById('listing-price');
            let listingDescription = document.getElementById('listing-description');
            let listingLocation = document.getElementById('listing-location');
            let age = document.getElementById('age');

            const price = parseFloat(listingPrice.value || 0);

            email = localStorage.getItem('email');
            password = localStorage.getItem('password');

            if (listingName.value && price > 0 && listingDescription.value && listingLocation.value)
            {
                try {
                    let imagePaths = [];

                    // Upload all images
                    if (selectedImages.length > 0)
                    {
                        for (let i = 0; i < selectedImages.length; i++) {
                            const formData = new FormData();
                            formData.append('listingImage', selectedImages[i]);

                            const uploadResponse = await fetch(getServerBase() + '/upload-listing', {
                                method: 'POST',
                                body: formData
                            });

                            if (uploadResponse.ok)
                            {
                                const uploadData = await uploadResponse.json();
                                imagePaths.push(uploadData.path);
                                console.log(`Image ${i + 1} uploaded successfully:`, uploadData.path);
                            }
                            else
                            {
                                alert(`Failed to upload image ${i + 1}. Please try again.`);
                                return;
                            }
                        }
                    }

                    // Create listing with image paths
                    const listingData = {
                        email: email,
                        password: password,
                        name: listingName.value,
                        pay: price,
                        description: listingDescription.value,
                        location: listingLocation.value,
                        age: age.value
                    };

                    if (imagePaths.length > 0) {
                        listingData.imagePaths = imagePaths;
                    }

                    const response = await fetch(getServerBase() + "/createListingupload", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(listingData)
                    });

                    const data = await response.json();
                    if (data.success && data.redirect)
                    {
                        localStorage.setItem('email', email);
                        localStorage.setItem('password', password);
                        window.location.href = getServerBase() + data.redirect;
                    }
                    else if (data.message === "failed")
                    {
                        window.location.href = getServerBase() + "/login";
                    }
                }
                catch (err) {
                    console.error("Create listing error:", err);
                    alert("Error creating listing. Please try again.");
                }
            }
            else
            {
                alert("You didn't complete the listing. Please fill out all fields.");
            }
        }

        function updatePreview()
        {
            // Get values from form
            let name = document.getElementById('listing-name').value;
            let price = document.getElementById('listing-price').value;
            let description = document.getElementById('listing-description').value;
            let location = document.getElementById('listing-location').value;
            let age = document.getElementById('age').value;

            // Update preview elements
            document.getElementById('preview-name').innerText = name || 'Listing Name';

            const priceValue = parseFloat(price);
            document.getElementById('preview-price').innerText = !isNaN(priceValue) && priceValue > 0 ? `$${priceValue.toFixed(2)}` : '$0.00';

            document.getElementById('preview-description').innerText = description || 'Your description will appear here.';

            document.getElementById('preview-location-header').innerText = location || 'Location';
            document.getElementById('preview-age').innerText = age || '13';
        }

        // Initial call to set default values when the page loads
        updatePreview();

    </script>

</html>
